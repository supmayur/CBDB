<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROSARUM TITANA</title>
  <style>
    :root {
      --metal-dark: #08090b;
      --metal-mid: #16181c;
      --metal-soft: #242831;
      --silver: #c1c8d2;
      --silver-bright: #f1f5fb;
      --rose-shadow: rgba(162, 126, 141, 0.18);
      --glow: rgba(211, 224, 255, 0.5);
      --deep-shadow: rgba(0, 0, 0, 0.7);
      --accent: #93a3bd;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--silver);
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 255, 255, 0.05), transparent 34%),
        radial-gradient(circle at 80% 15%, rgba(255, 255, 255, 0.035), transparent 30%),
        linear-gradient(140deg, #070809 0%, #111318 35%, #1a1d23 54%, #101217 75%, #070708 100%);
    }

    .scene {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      isolation: isolate;
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    .metal-grain,
    .rose-layer,
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .metal-grain {
      background-image:
        repeating-linear-gradient(
          42deg,
          rgba(255, 255, 255, 0.03) 0px,
          rgba(255, 255, 255, 0.01) 2px,
          rgba(0, 0, 0, 0.02) 4px,
          rgba(0, 0, 0, 0.05) 6px
        );
      opacity: 0.45;
      mix-blend-mode: soft-light;
      transform: translateZ(-30px);
    }

    .rose-layer {
      opacity: 0.6;
      background-image:
        radial-gradient(circle at 15% 20%, transparent 0 42px, rgba(218, 191, 204, 0.08) 43px 44px, transparent 45px),
        radial-gradient(circle at 15% 20%, transparent 0 16px, rgba(218, 191, 204, 0.08) 17px 18px, transparent 19px),
        radial-gradient(circle at 70% 40%, transparent 0 48px, rgba(196, 165, 179, 0.07) 49px 50px, transparent 51px),
        radial-gradient(circle at 70% 40%, transparent 0 20px, rgba(196, 165, 179, 0.07) 21px 22px, transparent 23px),
        radial-gradient(circle at 40% 78%, transparent 0 44px, rgba(188, 157, 173, 0.07) 45px 46px, transparent 47px),
        radial-gradient(circle at 40% 78%, transparent 0 15px, rgba(188, 157, 173, 0.07) 16px 17px, transparent 18px),
        radial-gradient(circle at 86% 74%, transparent 0 46px, rgba(220, 198, 211, 0.06) 47px 48px, transparent 49px),
        radial-gradient(circle at 86% 74%, transparent 0 18px, rgba(220, 198, 211, 0.06) 19px 20px, transparent 21px);
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
      transform: translateZ(-10px);
    }

    .vignette {
      background: radial-gradient(circle at center, transparent 36%, rgba(0, 0, 0, 0.62) 100%);
      z-index: 1;
    }

    .title-wrap {
      position: absolute;
      top: 8vh;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 3;
      animation: fadeIn 1.8s ease both;
    }

    .site-title {
      letter-spacing: 0.35em;
      font-size: clamp(1.25rem, 2vw, 2rem);
      color: transparent;
      background: linear-gradient(110deg, #808793 0%, #d9e0ea 35%, #8a92a0 55%, #f4f8ff 66%, #7d8695 100%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.15), 0 10px 18px var(--deep-shadow);
      white-space: nowrap;
    }

    .peacock {
      position: absolute;
      right: -2.2rem;
      top: -0.4rem;
      font-size: clamp(1.3rem, 1.8vw, 2.2rem);
      color: transparent;
      background: linear-gradient(135deg, #98a1ae 0%, #e8edf6 30%, #94a6bf 70%, #657486 100%);
      -webkit-background-clip: text;
      background-clip: text;
      filter: drop-shadow(0 0 6px rgba(201, 221, 255, 0.28));
      animation: shimmer 4s ease-in-out infinite;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      animation: fadeIn 2.1s ease 0.4s both;
      transform: translateZ(35px);
      padding: 2rem;
    }

    .line {
      font-size: clamp(1.35rem, 2.6vw, 2.5rem);
      letter-spacing: 0.06em;
      line-height: 1.4;
      text-shadow:
        0 0 12px rgba(232, 238, 255, 0.2),
        0 0 32px rgba(148, 161, 188, 0.25),
        0 12px 18px var(--deep-shadow);
      animation: breathe 5.5s ease-in-out infinite;
    }

    .line + .line {
      margin-top: 0.6em;
    }

    .enter-button {
      margin-top: 2.2rem;
      border: 1px solid rgba(186, 198, 216, 0.35);
      color: #f3f5fa;
      font-size: 1.05rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.8rem 2.6rem;
      border-radius: 999px;
      cursor: pointer;
      background:
        linear-gradient(150deg, rgba(248, 252, 255, 0.26), rgba(113, 122, 137, 0.18) 35%, rgba(53, 58, 69, 0.5) 100%),
        linear-gradient(125deg, #23262e, #11141b 70%);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        inset 0 16px 20px rgba(255, 255, 255, 0.06),
        0 10px 20px rgba(0, 0, 0, 0.5);
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
      position: relative;
      overflow: hidden;
      animation: fadeIn 2.4s ease 0.8s both;
    }

    .enter-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, transparent 10%, rgba(255, 255, 255, 0.3) 40%, transparent 60%);
      transform: translateX(-120%);
      transition: transform 0.6s ease;
    }

    .enter-button:hover {
      transform: translateY(-2px) scale(1.02);
      border-color: rgba(221, 230, 245, 0.7);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.14),
        inset 0 18px 22px rgba(255, 255, 255, 0.09),
        0 0 16px rgba(176, 199, 240, 0.32),
        0 12px 25px rgba(0, 0, 0, 0.6);
    }

    .enter-button:hover::before {
      transform: translateX(120%);
    }

    .enter-button:active {
      transform: translateY(0);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes breathe {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-3px);
      }
    }

    @keyframes shimmer {
      0%,
      100% {
        filter: drop-shadow(0 0 6px rgba(201, 221, 255, 0.2));
      }
      50% {
        filter: drop-shadow(0 0 11px rgba(220, 235, 255, 0.45));
      }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="metal-grain" id="grain"></div>
    <div class="rose-layer" id="roses"></div>
    <div class="vignette"></div>

    <header class="title-wrap" id="titleWrap">
      <h1 class="site-title">ROSARUM TITANA</h1>
      <span class="peacock" aria-hidden="true">🦚</span>
    </header>

    <main class="content" id="content">
      <p class="line">We have been waiting for you.</p>
      <p class="line">You seem ready for a change.</p>
      <button class="enter-button" id="enterButton" type="button">Enter</button>
    </main>
  </div>

  <script>
    const scene = document.getElementById("scene");
    const grain = document.getElementById("grain");
    const roses = document.getElementById("roses");
    const titleWrap = document.getElementById("titleWrap");
    const content = document.getElementById("content");
    const enterButton = document.getElementById("enterButton");

    scene.addEventListener("mousemove", (event) => {
      const x = (event.clientX / window.innerWidth - 0.5) * 2;
      const y = (event.clientY / window.innerHeight - 0.5) * 2;

      grain.style.transform = `translate3d(${x * -6}px, ${y * -6}px, -30px)`;
      roses.style.transform = `translate3d(${x * -14}px, ${y * -14}px, -10px)`;
      titleWrap.style.transform = `translate3d(calc(-50% + ${x * 8}px), ${y * -4}px, 20px)`;
      content.style.transform = `translate3d(${x * 6}px, ${y * 6}px, 35px)`;
    });

    scene.addEventListener("mouseleave", () => {
      grain.style.transform = "translate3d(0, 0, -30px)";
      roses.style.transform = "translate3d(0, 0, -10px)";
      titleWrap.style.transform = "translate3d(-50%, 0, 20px)";
      content.style.transform = "translate3d(0, 0, 35px)";
    });

    enterButton.addEventListener("click", () => {
      window.location.href = "selection.html";
    });
  </script>
</body>
</html>
